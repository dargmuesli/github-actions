name: 'DargStack: rgen'

permissions: {}

on:
  workflow_call:
    inputs:
      APT_PACKAGES:
        type: string
      NODE_VERSION:
        type: string
      NODE_VERSION_FILE:
        default: .nvmrc
        type: string
      PACKAGE_MANAGER:
        default: pnpm
        type: string

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout git repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: awalsh128/cache-apt-pkgs-action@681749ae568c81c2037cb9185e38b709b261bd2f # v1.6.1
        if: inputs.APT_PACKAGES != ''
        with:
          packages: ${{ inputs.APT_PACKAGES }}
          version: 1.0

      - name: Setup package manager
        run: |
          npm install -g corepack@latest
          corepack enable

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: ${{ inputs.PACKAGE_MANAGER }}
          node-version: ${{ inputs.NODE_VERSION }}
          node-version-file: ${{ inputs.NODE_VERSION_FILE }}

      - name: Install dependencies
        run: ${{ inputs.PACKAGE_MANAGER }} install

      - name: dargstack rgen
        run: ${{ inputs.PACKAGE_MANAGER }} exec dargstack_rgen --validate

      - name: dargstack derive
        run: |
          mkdir ~/scripts/
          wget "https://raw.githubusercontent.com/dargstack/dargstack/master/src/dargstack" -O ~/scripts/dargstack
          chmod +x ~/scripts/dargstack
          ~/scripts/dargstack derive
