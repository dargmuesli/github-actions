name: Deploy (Cloudflare Pages)

permissions: {}

on:
  workflow_call:
    inputs:
      ACCOUNT_ID:
        required: true
        type: string
      BRANCH:
        type: string
      DIRECTORY:
        type: string
      PROJECT_NAME:
        required: true
        type: string
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true

jobs:
  deploy:
    name: Deploy
    permissions:
      contents: read
      deployments: write
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-artifact
      - name: Extract build artifact
        run: |
          tar -xzvf build-artifact.tar
      - name: Install Wrangler v4
        run: npm install --save-dev wrangler@4
      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          accountId: ${{ inputs.ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy ${{ inputs.DIRECTORY || '.' }} --branch ${{ inputs.BRANCH }} --project-name=${{ inputs.PROJECT_NAME }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
